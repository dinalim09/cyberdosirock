<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>사이버 피크닉</title>
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS — Clean Kitsch
══════════════════════════════════════ */
:root {
  --bg:      #FFFFFF;
  --text:    #000000;
  --neon:    #00FF41;
  --magenta: #FF00FF;
  --yellow:  #FFFF00;
  --border:  3px solid #000;
  --sh:      4px 4px 0 #000;
  --sh-sm:   2px 2px 0 #000;
  --font:    'Arial Black', 'Impact', Arial, sans-serif;
}

/* ══════════════════════════════════════ RESET ══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #e8e8e8;
  font-family: var(--font);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: var(--font); text-transform: uppercase; letter-spacing: 0.04em; }

/* ══════════════════════════════════════ APP SHELL ══════════════════════════════════════ */
#app {
  width: 100%;
  max-width: 430px;
  height: 100dvh;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  border-left: 2px solid #ccc;
  border-right: 2px solid #ccc;
}

/* ══════════════════════════════════════ VIEWS ══════════════════════════════════════ */
.view { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.view.active { display: flex; }

/* ══════════════════════════════════════ BUTTON SYSTEM ══════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 11px 18px;
  border: var(--border); box-shadow: var(--sh);
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 12px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.06em;
  cursor: pointer; user-select: none; -webkit-user-select: none;
  transition: transform 0.07s, box-shadow 0.07s;
  outline: none;
}
.btn:active { transform: translate(2px,2px); box-shadow: var(--sh-sm); }
.btn-neon    { background: var(--neon); }
.btn-magenta { background: var(--magenta); color: #fff; }
.btn-yellow  { background: var(--yellow); }
.btn-sm      { padding: 7px 11px; font-size: 10px; }
.btn-icon    { padding: 8px; min-width: 38px; min-height: 38px; line-height: 1; }
.btn-icon.on { background: var(--neon); }

/* ══════════════════════════════════════ HOME VIEW ══════════════════════════════════════ */
#view-home { background: var(--bg); align-items: center; justify-content: center; }
.home-topbar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-bottom: var(--border);
  background: var(--yellow); z-index: 10;
}
.home-logo { font-size: 15px; font-weight: 900; letter-spacing: 0.1em; }
.home-topbar-actions { display: flex; gap: 8px; }
.home-body {
  display: flex; flex-direction: column; align-items: center;
  margin-top: 64px; padding: 24px 24px 32px;
}
.home-char-frame {
  width: 180px; height: 180px;
  border: var(--border); box-shadow: var(--sh);
  background: var(--neon);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
}
.home-char-emoji { font-size: 88px; line-height: 1; }
.home-char-img { width: 152px; height: 152px; object-fit: contain; image-rendering: pixelated; }
.home-eyebrow { font-size: 10px; letter-spacing: 0.18em; color: #777; margin-bottom: 8px; }
.home-title { font-size: 30px; font-weight: 900; line-height: 1.08; text-align: center; margin-bottom: 28px; }
.home-title mark { background: var(--magenta); color: #fff; padding: 1px 10px; }
.home-cta { font-size: 15px; padding: 15px 48px; }

/* ══════════════════════════════════════ BUILDER VIEW ══════════════════════════════════════ */
#view-builder { background: var(--bg); }

.builder-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px;
  border-bottom: var(--border); background: var(--bg);
  flex-shrink: 0; gap: 6px;
  flex-wrap: nowrap; overflow-x: auto;
}
.builder-topbar::-webkit-scrollbar { display: none; }
.builder-topbar-l { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.builder-topbar-r { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.builder-title { font-size: 11px; font-weight: 900; letter-spacing: 0.1em; white-space: nowrap; }

/* BG label chip */
#bgLabel {
  font-size: 9px; font-weight: 900; letter-spacing: 0.08em;
  padding: 4px 8px; border: 2px solid #000; box-shadow: var(--sh-sm);
  background: var(--yellow); white-space: nowrap;
}

/* ── Canvas Area ── */
.canvas-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #d0d0d0; overflow: hidden; position: relative;
}
.canvas-wrap { position: relative; flex-shrink: 0; }
#canvas-compose {
  display: block; border: var(--border); box-shadow: var(--sh);
  cursor: default; image-rendering: pixelated;
}
.grid-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.grid-overlay.show { opacity: 1; }
#canvas-doodle {
  position: absolute; top: 0; left: 0; display: block;
  pointer-events: none; image-rendering: pixelated;
}
#canvas-doodle.active { pointer-events: all; cursor: crosshair; }
#canvas-doodle.erase  { cursor: cell; }

/* ── Bottom Sheet ── */
#sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: var(--border);
  box-shadow: -3px -4px 0 #000; z-index: 40;
  transform: translateY(calc(100% - 56px));
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
#sheet.open { transform: translateY(0); }
.sheet-handle {
  height: 56px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; cursor: pointer; border-bottom: var(--border);
  background: var(--magenta); user-select: none;
}
.sheet-handle-lbl { font-size: 12px; font-weight: 900; color: #fff; letter-spacing: 0.1em; }
.sheet-caret { color: #fff; font-size: 14px; font-weight: 900; transition: transform 0.28s; }
#sheet.open .sheet-caret { transform: rotate(180deg); }
.sheet-tabs {
  display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: var(--border);
}
.sheet-tabs::-webkit-scrollbar { display: none; }
.stab {
  flex-shrink: 0; padding: 9px 15px;
  border: none; border-right: 2px solid #000;
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 10px; font-weight: 900;
  text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer;
}
.stab:last-child { border-right: none; }
.stab.on { background: var(--neon); }
.sheet-body { height: 230px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #000; }
.spanel { display: none; padding: 14px; }
.spanel.on { display: block; }

/* Item grid */
.item-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.item-card {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 9px 4px; border: var(--border); box-shadow: var(--sh-sm);
  cursor: pointer; background: var(--bg);
  transition: transform 0.07s, box-shadow 0.07s; user-select: none;
}
.item-card:active { transform: translate(2px,2px); box-shadow: 0 0 0 #000; }
.item-icon { font-size: 26px; line-height: 1; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
.item-icon img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
.item-lbl { font-size: 8px; font-weight: 900; text-align: center; letter-spacing: 0.05em; }

/* Info panel */
.info-form { display: flex; flex-direction: column; gap: 12px; }
.ifield label { display: block; font-size: 9px; font-weight: 900; letter-spacing: 0.12em; margin-bottom: 4px; }
.ifield input {
  width: 100%; padding: 9px 11px;
  border: var(--border); box-shadow: var(--sh-sm);
  font-family: var(--font); font-size: 13px; font-weight: 700;
  background: var(--bg); outline: none; text-transform: none;
}
.ifield input:focus { background: #ffffcc; }

/* Doodle panel */
.draw-controls { display: flex; flex-direction: column; gap: 12px; }
.draw-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.draw-row-lbl { font-size: 9px; font-weight: 900; letter-spacing: 0.1em; min-width: 36px; }
.swatch { width: 30px; height: 30px; border: var(--border); cursor: pointer; flex-shrink: 0; transition: transform 0.07s; }
.swatch:active { transform: scale(0.88); }
.swatch.sel { outline: 3px solid #000; outline-offset: 2px; box-shadow: var(--sh-sm); }
.szbtn {
  min-width: 30px; height: 30px; padding: 0 8px;
  display: flex; align-items: center; justify-content: center;
  border: var(--border); background: var(--bg);
  font-family: var(--font); font-size: 9px; font-weight: 900; cursor: pointer;
}
.szbtn.on { background: var(--neon); }

/* ══════════════════════════════════════ NEON FLASH ══════════════════════════════════════ */
#pxflash {
  position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0;
}
@keyframes flash { from { opacity: 0.22; } to { opacity: 0; } }
.flashing { animation: flash 0.14s ease-out forwards; }

/* ══════════════════════════════════════ STUB VIEWS ══════════════════════════════════════ */
.stub-view { background: var(--bg); align-items: center; justify-content: center; flex-direction: column; gap: 14px; padding: 40px; text-align: center; }
.stub-icon { font-size: 60px; }
.stub-ttl  { font-size: 20px; font-weight: 900; }
.stub-sub  { font-size: 10px; color: #888; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

<!-- ══════════════ HOME ══════════════ -->
<div id="view-home" class="view active">
  <div class="home-topbar">
    <div class="home-logo">사이버피크닉</div>
    <div class="home-topbar-actions">
      <button class="btn btn-icon" onclick="goView('social')"   aria-label="소셜">👥</button>
      <button class="btn btn-icon" onclick="goView('settings')" aria-label="설정">⚙️</button>
    </div>
  </div>
  <div class="home-body">
    <div class="home-char-frame" id="homeCharFrame">
      <span class="home-char-emoji" id="homeCharEmoji">🤖</span>
    </div>
    <p class="home-eyebrow">// TODAY'S PICNIC BUILDER //</p>
    <h1 class="home-title">오늘의<br><mark>도시락</mark><br>만들기</h1>
    <button class="btn btn-neon home-cta" onclick="goView('builder')">▶ START</button>
  </div>
</div>

<!-- ══════════════ BUILDER ══════════════ -->
<div id="view-builder" class="view">

  <!-- Top Bar -->
  <div class="builder-topbar">
    <div class="builder-topbar-l">
      <button class="btn btn-icon btn-sm" onclick="goView('home')" aria-label="뒤로">←</button>
      <span class="builder-title">BUILDER</span>
      <span id="bgLabel">☀️ 낮 잔디밭</span>
    </div>
    <div class="builder-topbar-r">
      <button class="btn btn-icon btn-sm" id="btnBgCycle" onclick="cycleBackground()" title="배경 변경">🌄</button>
      <button class="btn btn-icon btn-sm" id="btnGrid"    onclick="toggleGrid()"       title="격자">⊞</button>
      <button class="btn btn-icon btn-sm" id="btnDoodle"  onclick="toggleDoodle()"     title="그리기">✏️</button>
      <button class="btn btn-icon btn-sm" id="btnEraser"  onclick="handleEraser()"     title="지우개">🧹</button>
      <button class="btn btn-sm btn-magenta" onclick="exportImage()">저장↓</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas-compose"></canvas>
      <div    id="gridOverlay" class="grid-overlay"></div>
      <canvas id="canvas-doodle"></canvas>
    </div>
  </div>

  <!-- Bottom Sheet -->
  <div id="sheet">
    <div class="sheet-handle" onclick="toggleSheet()">
      <span class="sheet-handle-lbl">🍱 아이템 선택</span>
      <span class="sheet-caret">▲</span>
    </div>
    <div class="sheet-tabs">
      <button class="stab on" data-tab="main" onclick="switchTab('main')">메인</button>
      <button class="stab"    data-tab="side" onclick="switchTab('side')">사이드</button>
      <button class="stab"    data-tab="menu" onclick="switchTab('menu')">메뉴</button>
      <button class="stab"    data-tab="info" onclick="switchTab('info')">정보</button>
      <button class="stab"    data-tab="draw" onclick="switchTab('draw')">낙서</button>
    </div>
    <div class="sheet-body">
      <div class="spanel on" id="spanel-main"></div>
      <div class="spanel"    id="spanel-side"></div>
      <div class="spanel"    id="spanel-menu"></div>
      <div class="spanel"    id="spanel-info">
        <div class="info-form">
          <div class="ifield">
            <label>날짜</label>
            <input type="date" id="infoDate" oninput="redraw()" />
          </div>
          <div class="ifield">
            <label>시간</label>
            <input type="time" id="infoTime" oninput="redraw()" />
          </div>
          <div class="ifield">
            <label>메뉴명</label>
            <input type="text" id="infoMenu" placeholder="오늘의 도시락" maxlength="18" oninput="redraw()" />
          </div>
        </div>
      </div>
      <div class="spanel" id="spanel-draw">
        <div class="draw-controls">
          <div class="draw-row">
            <span class="draw-row-lbl">색상</span>
            <div id="paletteWrap" style="display:flex;flex-wrap:wrap;gap:7px;"></div>
          </div>
          <div class="draw-row">
            <span class="draw-row-lbl">크기</span>
            <div id="sizeWrap" style="display:flex;gap:7px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ SOCIAL ══════════════ -->
<div id="view-social" class="view stub-view">
  <div class="stub-icon">🌸</div>
  <div class="stub-ttl">SOCIAL FEED</div>
  <div class="stub-sub">친구들의 도시락을 구경하고<br>내 도시락을 공유하세요 (준비 중)</div>
  <button class="btn btn-sm" onclick="goView('home')">← 홈으로</button>
</div>

<!-- ══════════════ SETTINGS ══════════════ -->
<div id="view-settings" class="view stub-view">
  <div class="stub-icon">⚙️</div>
  <div class="stub-ttl">SETTINGS</div>
  <div class="stub-sub">앱 설정 (준비 중)</div>
  <button class="btn btn-sm" onclick="goView('home')">← 홈으로</button>
</div>

<div id="pxflash"></div>
</div>

<script>
/* ════════════════════════════════════════════
   ASSET PATHS — 여기서 이미지를 교체하세요
════════════════════════════════════════════ */
const ASSETS = {
  character: { src: './pixels/character.png', emoji: '🤖' },
  items: {
    /* ─ main ─ */
    gimbap:   { src:'./pixels/gimbap.png',   emoji:'🍙', label:'김밥',     cat:'main' },
    sandwich: { src:'./pixels/sandwich.png', emoji:'🥪', label:'샌드위치', cat:'main' },
    onigiri:  { src:'./pixels/onigiri.png',  emoji:'🍘', label:'주먹밥',   cat:'main' },
    burger:   { src:'./pixels/burger.png',   emoji:'🍔', label:'버거',     cat:'main' },
    pasta:    { src:'./pixels/pasta.png',    emoji:'🍝', label:'파스타',   cat:'main' },
    bento:    { src:'./pixels/bento.png',    emoji:'🍱', label:'벤또',     cat:'main' },
    /* ─ side ─ */
    egg:      { src:'./pixels/egg.png',      emoji:'🍳', label:'달걀',     cat:'side' },
    fruit:    { src:'./pixels/fruit.png',    emoji:'🍓', label:'딸기',     cat:'side' },
    cheese:   { src:'./pixels/cheese.png',   emoji:'🧀', label:'치즈',     cat:'side' },
    pickle:   { src:'./pixels/pickle.png',   emoji:'🥒', label:'피클',     cat:'side' },
    grape:    { src:'./pixels/grape.png',    emoji:'🍇', label:'포도',     cat:'side' },
    cookie:   { src:'./pixels/cookie.png',   emoji:'🍪', label:'쿠키',     cat:'side' },
    /* ─ menu ─ */
    maratang: { src:'./pixels/maratang.png', emoji:'🌶️', label:'마라탕',   cat:'menu' },
    tteok:    { src:'./pixels/tteok.png',    emoji:'🍡', label:'떡볶이',   cat:'menu' },
    ramen:    { src:'./pixels/ramen.png',    emoji:'🍜', label:'라면',     cat:'menu' },
    chicken:  { src:'./pixels/chicken.png',  emoji:'🍗', label:'치킨',     cat:'menu' },
    sushi:    { src:'./pixels/sushi.png',    emoji:'🍣', label:'초밥',     cat:'menu' },
    pizza:    { src:'./pixels/pizza.png',    emoji:'🍕', label:'피자',     cat:'menu' },
  }
};

/* ════════════════════════════════════════════
   BACKGROUND SCENE DRAW FUNCTIONS (fallback)
════════════════════════════════════════════ */
function drawDayGrass(ctx) {
  // Sky
  let g = ctx.createLinearGradient(0,0,0,CH*0.52);
  g.addColorStop(0,'#87CEEB'); g.addColorStop(1,'#C8E6FA');
  ctx.fillStyle = g; ctx.fillRect(0,0,CW,CH*0.52);
  // Ground
  g = ctx.createLinearGradient(0,CH*0.52,0,CH);
  g.addColorStop(0,'#7BC95E'); g.addColorStop(1,'#4A8C36');
  ctx.fillStyle = g; ctx.fillRect(0,CH*0.52,CW,CH*0.48+2);
  // Sun
  ctx.save();
  ctx.fillStyle = '#FFD700';
  ctx.shadowColor = '#FFB300'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(320, 60, 34, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Clouds
  drawCloud(ctx, 60,  55, 0.9);
  drawCloud(ctx, 180, 40, 0.7);
}
function drawEveningGrass(ctx) {
  // Sky
  let g = ctx.createLinearGradient(0,0,0,CH*0.52);
  g.addColorStop(0,'#9B2335'); g.addColorStop(0.5,'#FF6B35'); g.addColorStop(1,'#FFB347');
  ctx.fillStyle = g; ctx.fillRect(0,0,CW,CH*0.52);
  // Ground
  g = ctx.createLinearGradient(0,CH*0.52,0,CH);
  g.addColorStop(0,'#4A6741'); g.addColorStop(1,'#2D3E25');
  ctx.fillStyle = g; ctx.fillRect(0,CH*0.52,CW,CH*0.48+2);
  // Setting sun
  ctx.save();
  const sg = ctx.createRadialGradient(55,CH*0.52,0,55,CH*0.52,55);
  sg.addColorStop(0,'#FF6B00'); sg.addColorStop(1,'rgba(255,107,0,0)');
  ctx.fillStyle = sg; ctx.fillRect(0,CH*0.3,110,CH*0.4);
  ctx.fillStyle = '#FF4500';
  ctx.beginPath(); ctx.arc(55,CH*0.52,28,Math.PI,0,true); ctx.fill();
  ctx.restore();
}
function drawLibrary(ctx) {
  // Dark wall background
  ctx.fillStyle = '#2C1A0E'; ctx.fillRect(0,0,CW,CH);
  // Bookshelf planks
  const shelfColors = ['#3E2206','#4A2A0A'];
  for(let y=0; y<180; y+=62) {
    ctx.fillStyle = shelfColors[y%2]; ctx.fillRect(0,y+54,CW,10);
  }
  // Books
  const bookCols = ['#C62828','#2E7D32','#1565C0','#E65100','#6A1B9A','#00838F','#F9A825','#AD1457'];
  let bx = 4;
  for(let i=0; i<30; i++) {
    const shelfY = Math.floor(i/10)*62 + 8;
    const bw = 16+Math.floor(Math.sin(i*1.3)*4);
    const bh = 36+Math.floor(Math.cos(i*0.9)*8);
    ctx.fillStyle = bookCols[i%bookCols.length];
    ctx.fillRect(bx, shelfY, bw, bh);
    ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.strokeRect(bx,shelfY,bw,bh);
    // Spine line
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx+bw*0.3,shelfY+4); ctx.lineTo(bx+bw*0.3,shelfY+bh-4); ctx.stroke();
    bx += bw+1;
    if(bx > CW-20) bx = 4;
  }
  // Floor shadow
  let g = ctx.createLinearGradient(0,CH*0.52,0,CH);
  g.addColorStop(0,'#3E2206'); g.addColorStop(1,'#1a0d00');
  ctx.fillStyle = g; ctx.fillRect(0,CH*0.52,CW,CH*0.48+2);
}
function drawRestaurant(ctx) {
  // Elegant dark bg
  ctx.fillStyle = '#0C0818'; ctx.fillRect(0,0,CW,CH);
  // Ambient radial glow
  let g = ctx.createRadialGradient(CW/2,CH*0.4,0,CW/2,CH*0.4,260);
  g.addColorStop(0,'rgba(160,120,60,0.14)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,CW,CH);
  // Candle glows
  [[95,CH*0.52],[295,CH*0.52]].forEach(([cx,cy])=>{
    let cg = ctx.createRadialGradient(cx,cy,0,cx,cy,55);
    cg.addColorStop(0,'rgba(255,200,80,0.30)'); cg.addColorStop(1,'rgba(255,180,50,0)');
    ctx.fillStyle=cg; ctx.fillRect(cx-60,cy-60,120,120);
    // Candle flame
    ctx.fillStyle='#FFC107';
    ctx.beginPath(); ctx.ellipse(cx,cy-8,5,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF6F00';
    ctx.beginPath(); ctx.ellipse(cx,cy-4,3,5,0,0,Math.PI*2); ctx.fill();
  });
  // Floor
  g = ctx.createLinearGradient(0,CH*0.52,0,CH);
  g.addColorStop(0,'#1a0f2e'); g.addColorStop(1,'#0a0814');
  ctx.fillStyle=g; ctx.fillRect(0,CH*0.52,CW,CH*0.48+2);
}
function drawCloud(ctx, x, y, scale) {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  [[0,0,28],[26,4,22],[50,0,24],[72,4,18]].forEach(([dx,dy,r])=>{
    ctx.beginPath(); ctx.arc(x+dx*scale, y+dy*scale, r*scale, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

/* ════════════════════════════════════════════
   MAT ZONE — 트라페조이드 좌표
════════════════════════════════════════════ */
const MAT_Y1 = 175, MAT_Y2 = 415;
const MAT_X1L = 70, MAT_X1R = 320; // 상단 엣지
const MAT_X2L = 8,  MAT_X2R = 382; // 하단 엣지

function matPath(ctx) {
  ctx.beginPath();
  ctx.moveTo(MAT_X1L, MAT_Y1);
  ctx.lineTo(MAT_X1R, MAT_Y1);
  ctx.lineTo(MAT_X2R, MAT_Y2);
  ctx.lineTo(MAT_X2L, MAT_Y2);
  ctx.closePath();
}

/* ════════════════════════════════════════════
   CANVAS SIZING
════════════════════════════════════════════ */
function sizeCanvases() {
  const area  = document.getElementById('canvasArea');
  const wrap  = document.getElementById('canvasWrap');
  const availW = area.clientWidth  - 12;
  const availH = area.clientHeight - 12;
  const scale  = Math.min(availW / CW, availH / CH, 1);
  const dW = Math.floor(CW * scale);
  const dH = Math.floor(CH * scale);

  wrap.style.width  = dW + 'px';
  wrap.style.height = dH + 'px';

  [CC, DC].forEach(c => {
    c.width = CW; c.height = CH;
    c.style.width  = dW + 'px';
    c.style.height = dH + 'px';
  });

  const cellW = (dW / (CW / GRID_PX)).toFixed(2);
  const cellH = (dH / (CH / GRID_PX)).toFixed(2);
  const gl = document.getElementById('gridOverlay');
  gl.style.width  = dW + 'px';
  gl.style.height = dH + 'px';
  gl.style.backgroundImage =
    `linear-gradient(to right,  rgba(0,255,65,0.35) 1px, transparent 1px),
     linear-gradient(to bottom, rgba(0,255,65,0.35) 1px, transparent 1px)`;
  gl.style.backgroundSize = `${cellW}px ${cellH}px`;
}

/* ════════════════════════════════════════════
   REDRAW — L0 bg → L1 mat → L2 items → L3 chips
════════════════════════════════════════════ */
function redraw() {
  if (!CCX) return;
  CCX.clearRect(0, 0, CW, CH);

  const cycle = BG_CYCLES[S.bgIdx];

  // L0 — Background scene
  const bgImg = imgCache['bg_' + cycle.key];
  if (bgImg) {
    CCX.imageSmoothingEnabled = true;
    CCX.drawImage(bgImg, 0, 0, CW, CH);
  } else {
    cycle.bgDraw(CCX);
  }

  // Canvas border
  CCX.strokeStyle = '#000'; CCX.lineWidth = 6;
  CCX.strokeRect(3, 3, CW-6, CH-6);

  // L1 — Mat / tablecloth
  drawMat(CCX, cycle.mat);

  // L2 — Items
  CCX.save();
  S.items.forEach(it => drawItem(CCX, it));
  CCX.restore();

  // L3 — Info chips
  const date = document.getElementById('infoDate')?.value || '';
  const time = document.getElementById('infoTime')?.value || '';
  const menu = document.getElementById('infoMenu')?.value || '';
  drawChips(CCX, { date, time, menu });
}

/* ════════════════════════════════════════════
   MAT DRAWING
════════════════════════════════════════════ */
function drawMat(ctx, mat) {
  const matImg = imgCache['mat_' + mat.src];

  ctx.save();
  matPath(ctx);
  ctx.clip();

  if (matImg) {
    ctx.drawImage(matImg, MAT_X2L, MAT_Y1, MAT_X2R - MAT_X2L, MAT_Y2 - MAT_Y1);
  } else {
    if      (mat.type === 'checkered') drawCheckered(ctx, mat);
    else if (mat.type === 'desk')      drawDesk(ctx, mat);
    else                               drawLace(ctx, mat);
  }
  ctx.restore();

  // Mat border (outside clip)
  ctx.save();
  matPath(ctx);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
  ctx.stroke();
  // Inner highlight line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawCheckered(ctx, mat) {
  const tW = 22, tH = 18;
  for (let row = 0; row * tH < CH; row++) {
    for (let col = 0; col * tW < CW; col++) {
      ctx.fillStyle = (row + col) % 2 === 0 ? mat.c1 : mat.c2;
      ctx.fillRect(col * tW, MAT_Y1 + row * tH, tW, tH);
    }
  }
}
function drawDesk(ctx, mat) {
  // Wood grain gradient
  let g = ctx.createLinearGradient(0, MAT_Y1, 0, MAT_Y2);
  g.addColorStop(0, mat.c1); g.addColorStop(1, mat.c2);
  ctx.fillStyle = g;
  ctx.fillRect(MAT_X2L, MAT_Y1, MAT_X2R - MAT_X2L, MAT_Y2 - MAT_Y1);
  // Grain lines
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
  for (let y = MAT_Y1; y < MAT_Y2; y += 9) {
    ctx.beginPath();
    ctx.moveTo(MAT_X2L, y);
    ctx.bezierCurveTo(CW*0.3, y + Math.sin(y*0.07)*3, CW*0.7, y - Math.sin(y*0.07)*3, MAT_X2R, y);
    ctx.stroke();
  }
  // Desk edge highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(MAT_X2L, MAT_Y1, MAT_X2R - MAT_X2L, 6);
}
function drawLace(ctx, mat) {
  // White base
  ctx.fillStyle = mat.c1;
  ctx.fillRect(MAT_X2L, MAT_Y1, MAT_X2R - MAT_X2L, MAT_Y2 - MAT_Y1);
  // Subtle fabric texture (dot grid)
  ctx.fillStyle = 'rgba(200,190,180,0.4)';
  for (let y = MAT_Y1 + 8; y < MAT_Y2; y += 14) {
    for (let x = 14; x < CW; x += 14) {
      ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
    }
  }
  // Scallop (lace) border — top edge
  ctx.fillStyle = mat.c2;
  ctx.strokeStyle = 'rgba(180,160,140,0.6)'; ctx.lineWidth = 1;
  for (let x = MAT_X1L; x < MAT_X1R; x += 18) {
    ctx.beginPath(); ctx.arc(x+9, MAT_Y1, 9, Math.PI, 0); ctx.fill(); ctx.stroke();
  }
  // Scallop border — bottom edge
  for (let x = MAT_X2L; x < MAT_X2R; x += 18) {
    ctx.beginPath(); ctx.arc(x+9, MAT_Y2, 9, 0, Math.PI); ctx.fill(); ctx.stroke();
  }
}

/* ════════════════════════════════════════════
   ITEM DRAWING
════════════════════════════════════════════ */
function drawItem(ctx, it) {
  const asset = ASSETS.items[it.key];
  const img   = imgCache[it.key];
  const half  = it.size / 2;
  if (img) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, it.cx - half, it.cy - half, it.size, it.size);
  } else {
    ctx.font = `${Math.floor(it.size * 0.78)}px serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(asset.emoji, it.cx, it.cy);
  }
}

function drawChips(ctx, info) {
  ctx.save();
  const chips = [];
  if (info.menu) chips.push({ txt: info.menu, bg:'#FF00FF', fg:'#fff' });
  const dateStr = [info.date, info.time].filter(Boolean).join('  ');
  if (dateStr) chips.push({ txt: dateStr, bg:'#00FF41', fg:'#000' });
  ctx.font = 'bold 15px "Arial Black", Arial, sans-serif';
  ctx.textBaseline = 'middle';
  let x = 14, y = CH - 44;
  chips.forEach(chip => {
    const w = ctx.measureText(chip.txt).width + 22, h = 28;
    ctx.fillStyle = '#000'; ctx.fillRect(x+3, y+3, w, h);
    ctx.fillStyle = chip.bg; ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = chip.fg; ctx.textAlign = 'left';
    ctx.fillText(chip.txt, x+11, y + h/2);
    x += w + 10;
  });
  ctx.restore();
}

/* ════════════════════════════════════════════
   ITEMS — add with mat-zone default position
════════════════════════════════════════════ */
function addItem(key) {
  const id = ++UID;
  // Default position: within mat zone (center-ish)
  const cx = 100 + Math.random() * 190;
  const cy = (MAT_Y1 + 40) + Math.random() * (MAT_Y2 - MAT_Y1 - 80);
  S.items.push({ id, key, cx, cy, size: 72 });
  redraw();
}
function removeItem(id) {
  S.items = S.items.filter(it => it.id !== id);
  redraw();
}

/* ════════════════════════════════════════════
   COMPOSE CANVAS EVENTS
════════════════════════════════════════════ */
function bindComposeEvents() {
  let lastTap = 0;
  function pos(e) {
    const r  = CC.getBoundingClientRect();
    const sx = CW / r.width, sy = CH / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x:(src.clientX - r.left)*sx, y:(src.clientY - r.top)*sy };
  }
  function hit(x, y) {
    for (let i = S.items.length-1; i >= 0; i--) {
      const it = S.items[i];
      if (Math.abs(x-it.cx) < it.size/2 && Math.abs(y-it.cy) < it.size/2) return it;
    }
    return null;
  }
  function onDown(e) {
    if (S.ui.doodle || S.ui.erase) return;
    e.preventDefault();
    const { x, y } = pos(e);
    const now = Date.now();
    if (now - lastTap < 320) {
      const h = hit(x, y);
      if (h) { removeItem(h.id); return; }
    }
    lastTap = now;
    const h = hit(x, y);
    if (h) S.drag = { id: h.id, ox: x - h.cx, oy: y - h.cy };
  }
  function onMove(e) {
    if (S.ui.doodle || S.ui.erase || !S.drag) return;
    e.preventDefault();
    const { x, y } = pos(e);
    const it = S.items.find(i => i.id === S.drag.id);
    if (it) { it.cx = Math.max(0,Math.min(CW,x-S.drag.ox)); it.cy = Math.max(0,Math.min(CH,y-S.drag.oy)); redraw(); }
  }
  function onUp() { S.drag = null; }

  CC.addEventListener('mousedown',  onDown, {passive:false});
  CC.addEventListener('mousemove',  onMove, {passive:false});
  CC.addEventListener('mouseup',    onUp);
  CC.addEventListener('touchstart', onDown, {passive:false});
  CC.addEventListener('touchmove',  onMove, {passive:false});
  CC.addEventListener('touchend',   onUp);
}

/* ════════════════════════════════════════════
   DOODLE — draw + erase modes
════════════════════════════════════════════ */
function setDrawMode(mode) {
  // mode: null | 'draw' | 'erase'
  S.ui.doodle = mode === 'draw';
  S.ui.erase  = mode === 'erase';
  const active = S.ui.doodle || S.ui.erase;
  DC.classList.toggle('active', active);
  DC.classList.toggle('erase',  S.ui.erase);
  CC.style.pointerEvents = active ? 'none' : 'all';
  document.getElementById('btnDoodle').classList.toggle('on', S.ui.doodle);
  document.getElementById('btnEraser').classList.toggle('on', S.ui.erase);
}

function toggleDoodle() {
  setDrawMode(S.ui.doodle ? null : 'draw');
}

function handleEraser() {
  if (!S.ui.erase) {
    // 1st click: enter erase mode
    setDrawMode('erase');
  } else {
    // 2nd click: clear all doodle + exit
    DCX.clearRect(0, 0, CW, CH);
    setDrawMode(null);
    flash('#FF00FF'); // magenta flash = "전체 삭제" 피드백
  }
}

function clearDoodle() { DCX.clearRect(0, 0, CW, CH); }

function toggleGrid() {
  S.ui.grid = !S.ui.grid;
  document.getElementById('gridOverlay').classList.toggle('show', S.ui.grid);
  document.getElementById('btnGrid').classList.toggle('on', S.ui.grid);
}

function bindDoodleEvents() {
  let drawing = false;
  function pos(e) {
    const r  = DC.getBoundingClientRect();
    const sx = CW / r.width, sy = CH / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy };
  }
  function stamp(rawX, rawY) {
    const sx = Math.floor(rawX / GRID_PX) * GRID_PX;
    const sy = Math.floor(rawY / GRID_PX) * GRID_PX;
    const px = GRID_PX * S.ui.brushCells;

    if (S.ui.erase) {
      DCX.globalCompositeOperation = 'destination-out';
      DCX.fillStyle = 'rgba(0,0,0,1)';
      DCX.fillRect(sx - px/2, sy - px/2, px*2, px*2); // erase is 2x brush
      DCX.globalCompositeOperation = 'source-over';
    } else {
      DCX.globalCompositeOperation = 'source-over';
      DCX.fillStyle = S.ui.color;
      DCX.fillRect(sx, sy, px, px);
      flash(S.ui.color);
    }
  }
  function onDown(e) { e.preventDefault(); drawing = true; const p=pos(e); stamp(p.x,p.y); }
  function onMove(e) { if(!drawing) return; e.preventDefault(); const p=pos(e); stamp(p.x,p.y); }
  function onUp()    { drawing = false; }

  DC.addEventListener('mousedown',  onDown, {passive:false});
  DC.addEventListener('mousemove',  onMove, {passive:false});
  DC.addEventListener('mouseup',    onUp);
  DC.addEventListener('touchstart', onDown, {passive:false});
  DC.addEventListener('touchmove',  onMove, {passive:false});
  DC.addEventListener('touchend',   onUp);
}

/* ════════════════════════════════════════════
   NEON FLASH
════════════════════════════════════════════ */
let flashBusy = false;
function flash(color) {
  if (flashBusy) return;
  flashBusy = true;
  const el = document.getElementById('pxflash');
  el.style.background = color;
  el.classList.add('flashing');
  setTimeout(() => { el.classList.remove('flashing'); el.style.background=''; flashBusy=false; }, 150);
}

/* ════════════════════════════════════════════
   BUILD PANELS
════════════════════════════════════════════ */
function buildItemPanels() {
  const buckets = { main:[], side:[], menu:[] };
  Object.entries(ASSETS.items).forEach(([k,v]) => buckets[v.cat].push({ key:k,...v }));
  Object.entries(buckets).forEach(([cat, items]) => {
    const grid = document.createElement('div');
    grid.className = 'item-grid';
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'item-card';
      const iconEl = document.createElement('div');
      iconEl.className = 'item-icon';
      iconEl.textContent = item.emoji;
      card.appendChild(iconEl);
      const lbl = document.createElement('div');
      lbl.className = 'item-lbl';
      lbl.textContent = item.label;
      card.appendChild(lbl);
      // Try image
      const img = new Image();
      img.onload = () => {
        imgCache[item.key] = img;
        iconEl.textContent = '';
        const el = document.createElement('img');
        el.src = item.src;
        iconEl.appendChild(el);
      };
      img.src = item.src;
      card.addEventListener('click', () => addItem(item.key));
      grid.appendChild(card);
    });
    document.getElementById('spanel-' + cat).appendChild(grid);
  });
}

function buildPalette() {
  const wrap = document.getElementById('paletteWrap');
  PALETTE.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (col === S.ui.color ? ' sel' : '');
    sw.style.background = col;
    if (col === '#FFFFFF') sw.style.border = '3px solid #000';
    sw.addEventListener('click', () => {
      S.ui.color = col;
      wrap.querySelectorAll('.swatch').forEach(s => s.classList.remove('sel'));
      sw.classList.add('sel');
    });
    wrap.appendChild(sw);
  });
}

function buildSizeBtns() {
  const wrap = document.getElementById('sizeWrap');
  SIZES.forEach((sz, i) => {
    const btn = document.createElement('div');
    btn.className = 'szbtn' + (i === 0 ? ' on' : '');
    btn.textContent = sz.label;
    btn.addEventListener('click', () => {
      S.ui.brushCells = sz.cells;
      wrap.querySelectorAll('.szbtn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
    });
    wrap.appendChild(btn);
  });
}

/* ════════════════════════════════════════════
   EXPORT
════════════════════════════════════════════ */
async function exportImage() {
  try {
    const oc  = new OffscreenCanvas(CW, CH);
    const ctx = oc.getContext('2d');
    ctx.drawImage(CC, 0, 0);
    ctx.drawImage(DC, 0, 0);
    const blob = await oc.convertToBlob({ type:'image/png' });
    dlBlob(URL.createObjectURL(blob));
  } catch(_) {
    const tmp = document.createElement('canvas');
    tmp.width = CW; tmp.height = CH;
    const ctx = tmp.getContext('2d');
    ctx.drawImage(CC, 0, 0); ctx.drawImage(DC, 0, 0);
    dlBlob(tmp.toDataURL('image/png'), true);
  }
}
function dlBlob(url, isData=false) {
  const a = Object.assign(document.createElement('a'), { href:url, download:`cyber-picnic-${Date.now()}.png` });
  a.click();
  if (!isData) setTimeout(() => URL.revokeObjectURL(url), 4000);
}

   HELPERS
════════════════════════════════════════════ */
function seedInfo() {
  const now = new Date();
  document.getElementById('infoDate').value = now.toISOString().slice(0,10);
  document.getElementById('infoTime').value = now.toTimeString().slice(0,5);
}

function tryLoadAssets() {
  // Character
  const cImg = new Image();
  cImg.onload = () => {
    const frame = document.getElementById('homeCharFrame');
    const old   = document.getElementById('homeCharEmoji');
    if (old) frame.removeChild(old);
    const el = document.createElement('img');
    el.src = ASSETS.character.src; el.className = 'home-char-img';
    frame.appendChild(el);
  };
  cImg.src = ASSETS.character.src;

  // Background images
  BG_CYCLES.forEach(cycle => {
    const img = new Image();
    img.onload = () => { imgCache['bg_' + cycle.key] = img; redraw(); };
    img.src = cycle.bgSrc;
    // Mat image
    const mImg = new Image();
    mImg.onload = () => { imgCache['mat_' + cycle.mat.src] = mImg; redraw(); };
    mImg.src = cycle.mat.src;
  });
}
